name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # Lets you re-deploy the current main without pushing a commit.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Never let two deploys race; queue instead of cancelling so a finished build
# always lands.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Typecheck, plus the VRAM budget math every page renders its numbers
      # from. Fail the deploy here rather than shipping a broken page.
      - run: npm run check

      # `output: export` writes ./out
      - run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
